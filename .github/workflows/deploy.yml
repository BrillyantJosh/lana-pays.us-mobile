name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 46.225.70.103
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/lana-pays.us-mobile
            git pull origin main
            cat > .env << 'ENVEOF'
            LANA_REGISTER_API_KEY=${{ secrets.LANA_REGISTER_API_KEY }}
            BRAIN_API_URL=https://brain.lanapays.us
            BRAIN_PURCHASE_KEY=${{ secrets.BRAIN_PURCHASE_KEY }}
            ENVEOF
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d
